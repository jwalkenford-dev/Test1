<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dixie Summerhouse Condo — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a4a7a;
      position: relative;
      overflow: hidden;
    }

    .bg-photo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(27,65,120,0.78) 0%, rgba(10,40,80,0.65) 100%);
      z-index: 1;
    }

    .login-card {
      position: relative;
      z-index: 2;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.30);
      padding: 36px 40px;
      width: 100%;
      max-width: 390px;
      margin: 16px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #ebf4ff;
      border-radius: 50%;
      margin-bottom: 14px;
    }

    .login-icon svg {
      width: 28px;
      height: 28px;
      fill: #2b6cb0;
    }

    .login-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2b6cb0;
    }

    .login-header p {
      font-size: 0.82rem;
      color: #718096;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 5px;
    }

    .input-wrap {
      position: relative;
    }

    .form-group input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 0.9rem;
      color: #2d3748;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2b6cb0;
      box-shadow: 0 0 0 3px rgba(43,108,176,0.15);
    }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      color: #a0aec0;
      display: flex;
      align-items: center;
    }

    .toggle-pw:hover { color: #4a5568; }

    .toggle-pw svg { width: 18px; height: 18px; }

    input[name="password"] { padding-right: 36px; }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .error-msg .contact-hint {
      display: block;
      margin-top: 5px;
      color: #718096;
      font-size: 0.78rem;
    }

    .btn-login {
      width: 100%;
      padding: 10px;
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover:not(:disabled) { background: #2c5282; }

    .btn-login:disabled {
      background: #90b8e0;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 420px) {
      .login-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<img class="bg-photo" src="https://media.scurto.net/cdn-cgi/image/width=1280/2054/media/473954-summer-house-on-romar--1522-0-20248-515.jpg.jpg" alt="" />
<div class="bg-overlay"></div>

<div class="login-card">
  <div class="login-header">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </div>
    <h1>Dixie Summerhouse Condo</h1>
    <p>Sign in to access the booking system</p>
  </div>

  {% if error %}
  <div class="error-msg">
    {{ error }}
    <span class="contact-hint">Need help? Contact Jon at jwalkenford@gmail.com</span>
  </div>
  {% endif %}

  <form method="POST" action="/login" id="loginForm">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required autofocus placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" required placeholder="••••••••" />
        <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Show/hide password">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login" id="submitBtn">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Sign In</span>
    </button>
  </form>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }

  document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const text = document.getElementById('btnText');
    btn.disabled = true;
    spinner.style.display = 'block';
    text.textContent = 'Signing in…';
  });
</script>

</body>
</html>
