<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dixie Summerhouse Condo — Change Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
    }

    header {
      position: relative;
      color: white;
      overflow: hidden;
      min-height: 120px;
      display: flex;
      align-items: stretch;
    }

    .header-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
    }

    .header-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(27,65,120,0.82) 0%, rgba(27,65,120,0.5) 60%, rgba(0,0,0,0.2) 100%);
    }

    .header-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 20px 32px;
    }

    header h1 { font-size: 1.5rem; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    header p { font-size: 0.85rem; opacity: 0.9; margin-top: 2px; }

    .header-link {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.83rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 5px 14px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .header-link:hover { background: rgba(255,255,255,0.15); }

    .container {
      max-width: 420px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      padding: 28px;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 0.9rem;
      color: #2d3748;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2b6cb0;
      box-shadow: 0 0 0 3px rgba(43,108,176,0.15);
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn:hover { background: #2c5282; }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 0.84rem;
      margin-bottom: 16px;
    }

    .success-box {
      text-align: center;
      padding: 10px 0 4px;
    }
    .success-box .icon { font-size: 2rem; margin-bottom: 10px; }
    .success-box h3 { color: #276749; margin-bottom: 8px; }
    .success-box p { color: #718096; font-size: 0.85rem; margin-bottom: 16px; }
  </style>
</head>
<body>

<header>
  <img class="header-img" src="https://media.scurto.net/cdn-cgi/image/width=1280/2054/media/473954-summer-house-on-romar--1522-0-20248-515.jpg.jpg" alt="Dixie Summerhouse Condo" />
  <div class="header-overlay"></div>
  <div class="header-content">
    <div>
      <h1>Dixie Summerhouse Condo</h1>
      <p>Change Password</p>
    </div>
    <a href="/" class="header-link">Back to Bookings</a>
  </div>
</header>

<div class="container">
  <div class="card">

    {% if success %}
      <div class="success-box">
        <div class="icon">&#10003;</div>
        <h3>Password Updated</h3>
        <p>Your password has been changed successfully.</p>
        <a href="/" class="btn" style="display:block;text-align:center;text-decoration:none;">Back to Bookings</a>
      </div>

    {% else %}
      <h2>Change Password</h2>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/change-password">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" name="current_password" required autofocus />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new_password" required />
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" name="confirm_password" required />
        </div>
        <button type="submit" class="btn">Update Password</button>
      </form>
    {% endif %}

  </div>
</div>

</body>
</html>
